<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="/styles/request-delivery.css" />
    <title>Request || Delivery</title>
  </head>
  <body>
    <div class="container">
      <header>
        <nav class="navbar">
          <a class="beta" href="/index.html">
            <img
              class="logo-md"
              src="/images/Orange Modern Cargo Delivery Company Logo.png"
              alt="Paucek logo"
            />
          </a>
          <ul class="nav-btn-container">
            <li>
              <a
                id="register"
                class="btn btn-primary"
                href="/pages/register.html"
                >Register</a
              >
            </li>
          </ul>
        </nav>
      </header>

      <main>
        <section class="request-intro">
          <h1>Request a Delivery</h1>
          <p>
            Fill out the form below with your pickup and drop-off details, and
            we'll make sure your package gets delivered safely on time.
          </p>
        </section>

        <section class="request-form-section">
          <form id="form">
            <div class="form-group">
              <label for="pickup-address">📍 Pickup Address</label>
              <input
                id="pickup-address"
                type="text"
                placeholder="Enter pickup location (e.g Ikeja, Lagos)"
                required
              />
              <span class="error pick-up-address-error"></span>
            </div>

            <div class="form-group">
              <label for="dropoff-address">📦 Drop-off Address</label>
              <input
                id="dropoff-address"
                type="text"
                placeholder="Enter destination (e.g Lekki phase 1)"
                required
              />
              <span class="error dropoff-address-error"></span>
            </div>

            <div class="form-group">
              <label for="date-time">⏰ Delivery Date & Time</label>
              <input id="date-time" type="datetime-local" required />
              <span class="error date-time-error"></span>
            </div>

            <div class="form-group">
              <label for="package-details">📦 Package Details</label>
              <textarea
                id="package-details"
                rows="4"
                maxlength="200"
                placeholder="Describe your package (size, fragile, weight...)"
                required
              ></textarea>
              <span class="error package-details-error"></span>
            </div>

            <div class="submit-btn">
              <button type="submit">Request Delivery 🚚</button>
            </div>
          </form>

          <!-- Success Card -->
          <div id="success-card" class="success-card hidden">
            <h2>✅ Delivery Request Submitted!</h2>
            <p><strong>Pickup:</strong> <span id="success-pickup"></span></p>
            <p><strong>Drop-off:</strong> <span id="success-dropoff"></span></p>
            <p>
              <strong>Date & Time:</strong> <span id="success-datetime"></span>
            </p>
            <p>
              <strong>Package Details:</strong>
              <span id="success-package"></span>
            </p>
            <p>
              <strong>Estimated Cost:</strong> ₦<span id="success-cost"></span>
            </p>
            <button id="close-card" >Close</button>
          </div>
        </section>
      </main>
    </div>

    <script src="/scripts/request-delivery.js"></script>
  </body>
</html>
