<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="/styles/rider-dashboard.css" />
    <title>Rider || Dashbord</title>
  </head>
  <body>
    <div class="container">
      <!-- ==================== HEADER SECTION ==================== -->
      <header>
        <!-- 🌐 Navigation Bar -->
        <nav class="navbar">
          <a class="beta" href="/index.html">
            <img
              class="logo-md"
              src="/images/Orange Modern Cargo Delivery Company Logo.png"
              alt="Paucek logo"
          /></a>
        </nav>
      </header>

      <!-- ========== MAIN SECTION ========== -->
      <main>
        <section class="rider-dashboard-hearder">
          <h1>My Deliveries</h1>
          <p>Here! you can manage the Deliveries assigned to you</p>
        </section>

        <!-- Delivery-list section -->
        <section class="delivery-list">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Pickup</th>
                <th>Drop-off</th>
                <th>Package</th>
                <th>Status</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>001</td>
                <td>10 Ozumba Mbadiwe Avenue, Victoria Island</td>
                <td>22 Bourdillon Road, Ikoyi</td>
                <td>Small parcel</td>
                <td><span class="pending">Pending</span></td>
                <td><a href="" class="accept">Accept</a></td>
              </tr>
            </tbody>
          </table>
        </section>

        <section class="delivery-state">
          <p>No Deliveries assigned yet. Please check back later.</p>
        </section>
      </main>

      <script src="/scripts/rider.js"></script>
    </div>
  </body>
</html>
