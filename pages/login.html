<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT"
      crossorigin="anonymous"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles/login.css" />
    <link rel="stylesheet" href="/styles/loginquerie.css" />
    <title>Login Form</title>
  </head>
  <body>
    <div class="container">
      <div class="form-container">
        <h1>
          <a
            class="home-link-back-nav"
            href="/index.html"
            aria-label="Go back to homepage"
            >Welcome Back 🖐</a
          >
        </h1>
        <form id="my-form">
          <label for="username">
            Username
            <input
              id="username"
              type="text"
              name="username"
              required
              autocomplete="username"
              autofocus
            />
            <span id="username-error"></span>
          </label>

          <label for="password">
            Password
            <input
              id="password"
              type="password"
              name="password"
              required
              autocomplete="current-password"
            />
            <button type="button" id="togglePassword">Show Password</button>

            <span id="password-error"></span>
          </label>

          <div class="account-type-container">
            <p>Select Account Type</p>

            <div class="account-options">
              <div class="account-card" data-value="user">User</div>
              <div class="account-card" data-value="rider">Rider</div>
              <div class="account-card" data-value="merchant">Merchant</div>
            </div>

            <!-- Hidden input (this is what JS will use) -->
            <input type="hidden" id="account-type" />
            <span id="account-type-error"></span>
          </div>

          <input class="btn btn-primary" type="submit" value="Login" />
        </form>
        <span class="register"
          >Don't have account?<a
            class="register-link"
            href="/pages/register.html"
            >Register</a
          ></span
        >
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO"
      crossorigin="anonymous"
    ></script>

    <script src="/scripts/login.js"></script>
  </body>
</html>
